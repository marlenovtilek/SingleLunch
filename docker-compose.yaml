name: lunch

services:
  db:
    image: postgres:16
    volumes:
      - postgres_data:/var/lib/postgresql/data 
    env_file:
      - .env.backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 10
  api:
    command: bash -c "uv sync && uv run -- python manage.py migrate && uv run -- python manage.py runserver 0.0.0.0:8000"
    build:
      context: backend
    expose:
      - "8000"
    ports:
      - "8765:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env.backend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; req=urllib.request.Request('http://localhost:8000/healthz/', headers={'X-Forwarded-Proto':'https'}); urllib.request.urlopen(req, timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy
  scheduler:
    command: bash -c "uv sync && bash /app/scripts/run_scheduler.sh"
    build:
      context: backend
    volumes:
      - ./backend:/app
    env_file:
      - .env.backend
    depends_on:
      db:
        condition: service_healthy
  web:
    command: >-
      bash -c "
      pnpm install -r &&
      pnpm --filter web build &&
      rm -rf apps/web/.next/standalone/apps/web/.next/static apps/web/.next/standalone/apps/web/public &&
      mkdir -p apps/web/.next/standalone/apps/web/.next &&
      cp -R apps/web/.next/static apps/web/.next/standalone/apps/web/.next/static &&
      cp -R apps/web/public apps/web/.next/standalone/apps/web/public &&
      HOSTNAME=0.0.0.0 PORT=3000 node apps/web/.next/standalone/apps/web/server.js"
    build:
      context: frontend
    volumes:
      - ./frontend:/app
    expose:
      - "3000"
    ports:
      - "3000:3000"
    env_file:
      - .env.frontend
    healthcheck:
      test: ["CMD", "node", "-e", "const os=require('os'); const host=os.hostname(); require('http').get('http://' + host + ':3000/login', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      api:
        condition: service_healthy
volumes:
  postgres_data: 
    external: false
