name: lunch

services:
  db:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env.backend
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - .env.backend
    command: >
      bash -c "
      uv run -- python manage.py migrate &&
      uv run -- python manage.py collectstatic --noinput &&
      uv run -- gunicorn api.wsgi:application
      --bind 0.0.0.0:8000
      --workers ${GUNICORN_WORKERS:-3}
      --threads ${GUNICORN_THREADS:-2}
      --timeout ${GUNICORN_TIMEOUT:-120}
      "
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; req=urllib.request.Request('http://localhost:8000/healthz/', headers={'X-Forwarded-Proto':'https'}); urllib.request.urlopen(req, timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles

  scheduler:
    build:
      context: backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - .env.backend
    command: bash -c "bash /app/scripts/run_scheduler.sh"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - .env.frontend
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "const os=require('os'); const host=os.hostname(); require('http').get('http://' + host + ':3000/login', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      api:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - media_data:/var/www/media:ro
      - static_data:/var/www/static:ro

volumes:
  postgres_data:
  media_data:
  static_data:
